name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: gofmt check
        working-directory: gitops-ai-platform
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        working-directory: gitops-ai-platform
        run: go vet ./...

      - name: Build
        working-directory: gitops-ai-platform
        run: go build ./...

      - name: Test
        working-directory: gitops-ai-platform
        run: go test ./... -v

      - name: govulncheck
        working-directory: gitops-ai-platform
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
